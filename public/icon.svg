<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Signal arcs -->
  <g fill="none" stroke-linecap="round" stroke-width="8" opacity="0.3">
    <path d="M 70 186 A 82 82 0 0 1 186 186" stroke="#f59e0b"/>
    <path d="M 90 186 A 62 62 0 0 1 166 186" stroke="#f59e0b" opacity="0.5"/>
    <path d="M 110 186 A 42 42 0 0 1 146 186" stroke="#f59e0b" opacity="0.7"/>
  </g>
  <!-- Main signal arcs -->
  <g fill="none" stroke="url(#glow)" stroke-linecap="round" stroke-width="10">
    <path d="M 58 170 A 90 90 0 0 1 198 170" opacity="0.4"/>
    <path d="M 78 170 A 68 68 0 0 1 178 170" opacity="0.65"/>
    <path d="M 98 170 A 46 46 0 0 1 158 170" opacity="0.9"/>
  </g>
  <!-- Center dot -->
  <circle cx="128" cy="170" r="12" fill="#f59e0b"/>
  <circle cx="128" cy="170" r="6" fill="#fbbf24"/>
  <!-- T letter -->
  <g fill="#e2e8f0" font-family="monospace" font-weight="bold">
    <text x="128" y="95" font-size="56" text-anchor="middle" dominant-baseline="middle">T</text>
  </g>
  <!-- Subtitle -->
  <text x="128" y="228" font-family="monospace" font-size="16" fill="#64748b" text-anchor="middle" letter-spacing="2">PROXY</text>
</svg>
