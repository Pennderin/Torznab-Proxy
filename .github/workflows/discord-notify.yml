name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_DESC: ${{ github.event.repository.description }}
        run: |
          BODY="${RELEASE_BODY:0:900}"
          
          # Trim repo description to first sentence or clause (before em dash or period)
          SHORT_DESC=$(echo "$REPO_DESC" | sed 's/ — .*//' | sed 's/\. .*/\./' | head -c 120)
          
          if [ -n "$SHORT_DESC" ]; then
            FULL_DESC="*${SHORT_DESC}*\n\n${BODY}"
          else
            FULL_DESC="${BODY}"
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${REPO_NAME} ${RELEASE_TAG}",
              "url": "${RELEASE_URL}",
              "description": $(echo -e "$FULL_DESC" | jq -Rs .),
              "color": 3447003,
              "footer": {
                "text": "GitHub Release"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
